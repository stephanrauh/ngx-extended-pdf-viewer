server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html index.htm;
    server_name localhost;

    # Browsers refuse to execute `.mjs` modules unless the server returns a
    # JavaScript MIME type. nginx-alpine's default mime.types maps `.mjs`
    # to `application/octet-stream`, which Chromium then blocks per the
    # "strict MIME type checking" rule for module scripts.
    types {
        text/html       html htm;
        text/css        css;
        application/javascript js mjs;
        application/wasm wasm;
        image/png       png;
        image/jpeg      jpg jpeg;
        image/gif       gif;
        image/svg+xml   svg;
        application/pdf pdf;
        font/woff       woff;
        font/woff2      woff2;
        application/json json;
    }
    default_type application/octet-stream;

    location / {
        try_files $uri $uri/ /index.html;
    }
}
